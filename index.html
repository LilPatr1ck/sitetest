<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Вход</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
  <div class="login-container">
    <h1>Вход в систему</h1>
    <form class="login-form">
      <label for="login">Логин:</label>
      <input type="text" id="login" name="login" required>

      <label for="password">Пароль:</label>
      <input type="password" id="password" name="password" required>

      <label for="email">Почта (необязательно):</label>
      <input type="email" id="email" name="email">

      <button type="submit">Войти</button>
    </form>
  </div>

  <!-- Блок свободного перехода: -->
  <div class="role-quick-nav">
    <h2>Быстрый переход (без входа)</h2>
    <a href="employee.html" class="quick-nav-btn">Employee</a>
    <a href="hr.html" class="quick-nav-btn">HR / Head</a>
    <a href="admin.html" class="quick-nav-btn">Admin</a>
  </div>
</body>
</html>
